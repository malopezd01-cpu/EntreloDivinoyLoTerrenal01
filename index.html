<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Entre lo Divino y lo Terrenal</title>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <style>
    :root{
      --bg:#0f1115;
      --text:#e9eef7;
      --btn:#243046;
      --btn2:#2f4060;
      --shadow:0 18px 60px rgba(0,0,0,.45);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 700px at 50% -10%, #1b2340 0%, var(--bg) 55%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:14px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:5;
      background: linear-gradient(to bottom, rgba(15,17,21,.92), rgba(15,17,21,.65));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .title{ font-weight:800; font-size:14px; }
    .controls{ display:flex; gap:8px; align-items:center; }
    button{
      border:0;
      border-radius:12px;
      padding:10px 12px;
      background:var(--btn);
      color:var(--text);
      font-weight:800;
      cursor:pointer;
      transition: background .2s ease, transform .05s ease;
      touch-action: manipulation;
    }
    button:hover{ background:var(--btn2); }
    button:active{ transform: translateY(1px); }

    main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .stage{
      width:min(1100px,96vw);
      height:min(720px,78vh);
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* FULLSCREEN real */
    .stage:fullscreen{ width:100vw; height:100vh; border-radius:0; }
    .stage:-webkit-full-screen{ width:100vw; height:100vh; border-radius:0; }

    /* Fallback pseudo-full para iPhone */
    .stage.pseudo-full{
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      z-index: 9999 !important;
      background: rgba(10,12,16,0.98);
    }

    /* ====== ZOOM LAYER ====== */
    #zoomViewport{
      width:100%;
      height:100%;
      overflow:hidden;
      position:relative;
      /* IMPORTANT: necesitamos capturar gestos */
      touch-action: none;
    }
    #zoomWrap{
      width:100%;
      height:100%;
      transform-origin: 0 0;
      will-change: transform;
    }

    #book{ width:100%; height:100%; }

    .page{
      background:#fff;
      position:relative;
      overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.10);
    }
    .page img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#fff;
      /* evita selección/drag raro */
      -webkit-user-drag:none;
      user-select:none;
      pointer-events:none;
    }

    /* Flechas dentro del libro */
    .navInside{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      z-index:30;
      width:44px;
      height:44px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.35);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      backdrop-filter: blur(8px);
      touch-action: manipulation;
    }
    .navInside:hover{ background: rgba(0,0,0,.50); }
    .navInside:active{ transform: translateY(-50%) scale(0.98); }
    .navLeft{ left:14px; }
    .navRight{ right:14px; }

    /* Botones zoom (opcionales, ayudan mucho en móvil) */
    .zoomBtns{
      position:absolute;
      left:14px;
      bottom:14px;
      z-index:35;
      display:flex;
      gap:8px;
    }
    .zoomBtn{
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.35);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      backdrop-filter: blur(8px);
      touch-action: manipulation;
    }
    .zoomBtn:hover{ background: rgba(0,0,0,.50); }

    @media (max-width:820px){
      .navInside{ width:50px; height:50px; }
      .zoomBtn{ width:50px; height:50px; }
    }
  </style>
</head>

<body>
<header>
  <div class="title">Entre lo Divino y lo Terrenal</div>
  <div class="controls">
    <button id="fullscreen">⛶</button>
  </div>
</header>

<main>
  <div class="stage" id="stage">

    <div class="navInside navLeft" id="prevInside">◀</div>
    <div class="navInside navRight" id="nextInside">▶</div>

    <div class="zoomBtns">
      <div class="zoomBtn" id="zoomOut">−</div>
      <div class="zoomBtn" id="zoomIn">+</div>
      <div class="zoomBtn" id="zoomReset">↺</div>
    </div>

    <!-- ✅ Zoom viewport captura pinch/pan -->
    <div id="zoomViewport">
      <div id="zoomWrap">
        <div id="book"></div>
      </div>
    </div>

  </div>
</main>

<script>
  const TOTAL = 168;

  const stage = document.getElementById("stage");
  const book = document.getElementById("book");

  function nombrePagina(num){
    let n = String(num);
    if(num < 10) n = "0" + num;
    return "./LIBRO-" + n + ".png";
  }

  for(let i=1; i<=TOTAL; i++){
    const page = document.createElement("div");
    page.className = "page";

    const img = document.createElement("img");
    img.src = nombrePagina(i);
    img.alt = "Página " + i;

    page.appendChild(img);
    book.appendChild(page);
  }

  const pageFlip = new St.PageFlip(book,{
    width:520,
    height:700,
    size:"stretch",
    minWidth:320,
    maxWidth:1400,
    minHeight:420,
    maxHeight:1000,
    showCover:true,
    mobileScrollSupport:true,
    useMouseEvents:true,
    flippingTime:700,
    swipeDistance:25
  });

  pageFlip.loadFromHTML(document.querySelectorAll(".page"));
  pageFlip.flip(0);

  document.getElementById("prevInside").onclick = () => pageFlip.flipPrev();
  document.getElementById("nextInside").onclick = () => pageFlip.flipNext();

  // ========== FULLSCREEN (real + fallback) ==========
  const fullBtn = document.getElementById("fullscreen");

  function hasNativeFullscreen(){
    return !!(document.fullscreenEnabled || document.webkitFullscreenEnabled);
  }
  function isNativeFullscreen(){
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  async function requestNativeFullscreen(el){
    if(el.requestFullscreen) return el.requestFullscreen();
    if(el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
  }
  async function exitNativeFullscreen(){
    if(document.exitFullscreen) return document.exitFullscreen();
    if(document.webkitExitFullscreen) return document.webkitExitFullscreen();
  }
  function isPseudoFullscreen(){ return stage.classList.contains("pseudo-full"); }
  function enterPseudoFullscreen(){ stage.classList.add("pseudo-full"); document.body.style.overflow="hidden"; }
  function exitPseudoFullscreen(){ stage.classList.remove("pseudo-full"); document.body.style.overflow=""; }

  async function toggleFullscreen(){
    try{
      if(hasNativeFullscreen()){
        if(!isNativeFullscreen()) await requestNativeFullscreen(stage);
        else await exitNativeFullscreen();
        setTimeout(()=>pageFlip.update(), 250);
        return;
      }
      if(!isPseudoFullscreen()) enterPseudoFullscreen(); else exitPseudoFullscreen();
      setTimeout(()=>pageFlip.update(), 250);
    }catch(e){
      if(!isPseudoFullscreen()) enterPseudoFullscreen(); else exitPseudoFullscreen();
      setTimeout(()=>pageFlip.update(), 250);
    }
  }
  fullBtn.addEventListener("click", toggleFullscreen);
  document.addEventListener("fullscreenchange", ()=>setTimeout(()=>pageFlip.update(),150));
  document.addEventListener("webkitfullscreenchange", ()=>setTimeout(()=>pageFlip.update(),150));

  // ========== ZOOM (pinch + pan + double tap) ==========
  const viewport = document.getElementById("zoomViewport");
  const wrap = document.getElementById("zoomWrap");

  let scale = 1;
  let minScale = 1;
  let maxScale = 3;

  let tx = 0, ty = 0; // translate
  let isPanning = false;
  let startX=0, startY=0;

  let pinchStartDist = 0;
  let pinchStartScale = 1;
  let pinchCenter = {x:0,y:0};

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function applyTransform(){
    wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  }

  function resetZoom(){
    scale = 1;
    tx = 0; ty = 0;
    applyTransform();
    // cuando volvemos a 1x, dejamos swipe libre para pasar páginas
    pageFlip.getUI && pageFlip.getUI();
  }

  function zoomTo(newScale, cx, cy){
    newScale = clamp(newScale, minScale, maxScale);

    // Ajuste para hacer zoom hacia el punto (cx,cy) dentro del viewport
    const rect = viewport.getBoundingClientRect();
    const x = cx - rect.left;
    const y = cy - rect.top;

    // Convertimos el punto a coords del contenido antes del zoom
    const contentX = (x - tx) / scale;
    const contentY = (y - ty) / scale;

    // Aplicamos nueva escala y recalculamos tx/ty para mantener el punto bajo los dedos
    scale = newScale;
    tx = x - contentX * scale;
    ty = y - contentY * scale;

    applyTransform();
  }

  function distance(t1, t2){
    const dx = t2.clientX - t1.clientX;
    const dy = t2.clientY - t1.clientY;
    return Math.hypot(dx, dy);
  }

  function isZoomed(){
    return scale > 1.01;
  }

  // ✅ Doble tap para 1x ↔ 2x
  let lastTap = 0;
  viewport.addEventListener("touchend", (e)=>{
    const now = Date.now();
    const dt = now - lastTap;
    lastTap = now;

    // solo 1 dedo
    if(e.changedTouches && e.changedTouches.length === 1 && dt < 280){
      const t = e.changedTouches[0];
      if(isZoomed()) resetZoom();
      else zoomTo(2, t.clientX, t.clientY);
      // cuando está en zoom, conviene no pasar páginas con swipe accidental
      e.preventDefault();
    }
  }, {passive:false});

  viewport.addEventListener("touchstart", (e)=>{
    if(e.touches.length === 2){
      pinchStartDist = distance(e.touches[0], e.touches[1]);
      pinchStartScale = scale;
      pinchCenter = {
        x: (e.touches[0].clientX + e.touches[1].clientX)/2,
        y: (e.touches[0].clientY + e.touches[1].clientY)/2
      };
      e.preventDefault();
    }else if(e.touches.length === 1 && isZoomed()){
      // pan solo si estamos en zoom
      isPanning = true;
      startX = e.touches[0].clientX - tx;
      startY = e.touches[0].clientY - ty;
      e.preventDefault();
    }
  }, {passive:false});

  viewport.addEventListener("touchmove", (e)=>{
    if(e.touches.length === 2){
      const d = distance(e.touches[0], e.touches[1]);
      const factor = d / pinchStartDist;
      const newScale = pinchStartScale * factor;
      zoomTo(newScale, pinchCenter.x, pinchCenter.y);
      e.preventDefault();
    }else if(e.touches.length === 1 && isPanning){
      tx = e.touches[0].clientX - startX;
      ty = e.touches[0].clientY - startY;
      applyTransform();
      e.preventDefault();
    }else{
      // NO prevenimos aquí para que el swipe pase página cuando no hay zoom
      // (con touch-action: none en viewport, solo dejamos swipe de PageFlip vía el propio componente)
    }
  }, {passive:false});

  viewport.addEventListener("touchend", (e)=>{
    if(e.touches.length === 0){
      isPanning = false;
      pinchStartDist = 0;
      pinchStartScale = scale;
    }
  });

  // Botones zoom (ayudan mucho)
  document.getElementById("zoomIn").onclick = () => zoomTo(scale + 0.25, window.innerWidth/2, window.innerHeight/2);
  document.getElementById("zoomOut").onclick = () => zoomTo(scale - 0.25, window.innerWidth/2, window.innerHeight/2);
  document.getElementById("zoomReset").onclick = () => resetZoom();

  // Si cambias de página, mantenemos el zoom (para lectura); si quieres que se resetee, descomenta:
  // pageFlip.on("flip", ()=> resetZoom());

  // Ajuste tras resize/orientación
  let rT=null;
  window.addEventListener("resize", ()=>{
    clearTimeout(rT);
    rT=setTimeout(()=>{
      pageFlip.update();
      applyTransform();
    }, 250);
  });
</script>

</body>
</html>
