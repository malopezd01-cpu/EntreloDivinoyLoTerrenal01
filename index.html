<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entre lo Divino y lo Terrenal</title>

  <!-- jQuery + Turn.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

  <style>
    :root{
      --bg:#0f0f10;
      --card:#151618;
      --text:#f2f2f3;
      --muted:#b9bcc2;
      --btn:#24262a;
      --btn2:#2f343a;
      --accent:#ffffff;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 50% 30%, #1a1a1d 0%, var(--bg) 60%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(15,15,16,.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 10px 12px;
    }
    .topbar-inner{
      max-width: 1200px;
      margin: 0 auto;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width: 220px;
    }
    .title strong{
      font-size: 15px;
      letter-spacing:.2px;
    }
    .title span{
      font-size:12px;
      color:var(--muted);
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, var(--btn2) 0%, var(--btn) 100%);
      color:var(--text);
      padding:8px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-weight:600;
      font-size:13px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }
    .btn:active{transform: translateY(1px);}
    .btn[disabled]{
      opacity:.45;
      cursor:not-allowed;
      transform:none;
    }

    .group{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border:1px solid rgba(255,255,255,.10);
      border-radius:999px;
      background: rgba(255,255,255,.04);
    }
    .label{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    input[type="range"]{width: 160px;}
    .pagebox{
      min-width: 90px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      padding: 2px 6px;
    }

    .wrap{
      max-width: 1200px;
      width: 100%;
      margin: 18px auto 30px;
      padding: 0 12px;
      display:flex;
      justify-content:center;
    }

    /* Contenedor del libro */
    .stage{
      width: min(1100px, 100%);
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
    }

    #flipbook{
      margin: 0 auto;
      /* tamaño se define por JS para responsive */
    }

    /* Cada página */
    .page{
      background: #fff;
      overflow:hidden;
    }
    .page img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#000; /* si la imagen no llena, se ve negro elegante */
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    .hint{
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 12px 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-align:center;
    }

    /* Mejoras para móvil */
    @media (max-width: 700px){
      .title{min-width: unset;}
      input[type="range"]{width: 120px;}
      .stage{padding:10px;}
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="title">
        <strong>Entre lo Divino y lo Terrenal</strong>
        <span>Flipbook · GitHub Pages</span>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn" type="button">← Anterior</button>
        <button class="btn" id="nextBtn" type="button">Siguiente →</button>

        <div class="group">
          <span class="label">Página</span>
          <input id="pageRange" type="range" min="1" max="168" value="1" />
          <div class="pagebox"><span id="pageNow">1</span> / <span id="pageTotal">168</span></div>
        </div>

        <button class="btn" id="zoomOut" type="button">− Zoom</button>
        <button class="btn" id="zoomIn" type="button">+ Zoom</button>
        <button class="btn" id="fsBtn" type="button">⛶ Pantalla completa</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="stage" id="stage">
      <div id="flipbook"></div>
    </div>
  </div>

  <div class="hint">
    En celular: desliza (swipe) a izquierda/derecha para pasar página. En PC: arrastra la esquina o usa ← →.
  </div>

  <script>
    // ===== CONFIG =====
    const TOTAL_PAGES = 168;
    const FILE_PREFIX = "LIBRO-";
    const FILE_EXT = ".png";
    // ==================

    const $flipbook = $("#flipbook");
    const $pageRange = $("#pageRange");
    const $pageNow = $("#pageNow");
    const $pageTotal = $("#pageTotal");
    const $prevBtn = $("#prevBtn");
    const $nextBtn = $("#nextBtn");
    const $zoomIn = $("#zoomIn");
    const $zoomOut = $("#zoomOut");

    $pageTotal.text(TOTAL_PAGES);
    $pageRange.attr("max", TOTAL_PAGES);

    function pad2(n){ return String(n).padStart(2, "0"); }

    // Crea el HTML de páginas en ORDEN (01..168)
    function buildPages(){
      $flipbook.empty();
      for(let i=1;i<=TOTAL_PAGES;i++){
        const file = `${FILE_PREFIX}${pad2(i)}${FILE_EXT}`;
        const $page = $(`<div class="page"><img alt="Página ${i}" src="${file}"></div>`);
        $flipbook.append($page);
      }
    }

    // Define tamaño responsive del libro
    function getBookSize(){
      const stage = document.getElementById("stage");
      const w = stage.clientWidth - 24; // padding
      const hMax = Math.round(window.innerHeight * 0.78);

      // Proporción aproximada de página (ajústala si tu página es más alta/ancha)
      const pageRatio = 1.414; // tipo A4 (alto/ancho)
      const isMobile = window.matchMedia("(max-width: 760px)").matches;

      // en mobile: 1 página -> ancho ~100% del contenedor
      // en desktop: 2 páginas -> cada página es la mitad del ancho del libro
      let bookW = Math.min(w, 1100);
      let pageW = isMobile ? bookW : Math.floor(bookW / 2);
      let pageH = Math.floor(pageW * pageRatio);

      // limitar por altura
      if(pageH > hMax){
        pageH = hMax;
        pageW = Math.floor(pageH / pageRatio);
        bookW = isMobile ? pageW : pageW * 2;
      }

      return { bookW, bookH: pageH, display: isMobile ? "single" : "double" };
    }

    let currentZoom = 1;

    function applySize(){
      const { bookW, bookH, display } = getBookSize();

      // Si ya existe el flipbook, solo cambiamos tamaño y display
      if($flipbook.data("turn")){
        try{
          $flipbook.turn("display", display);
          $flipbook.turn("size", Math.floor(bookW * currentZoom), Math.floor(bookH * currentZoom));
        }catch(e){}
      }else{
        // Inicialización
        $flipbook.css({ width: bookW, height: bookH });

        $flipbook.turn({
          width: Math.floor(bookW * currentZoom),
          height: Math.floor(bookH * currentZoom),
          autoCenter: true,
          display: display,
          elevation: 60,
          gradients: true,
          duration: 650,
          when: {
            turning: function(e, page){
              updateUI(page);
            },
            turned: function(e, page){
              updateUI(page);
            }
          }
        });
      }
    }

    function updateUI(page){
      const p = page || ($flipbook.data("turn") ? $flipbook.turn("page") : 1);
      $pageNow.text(p);
      $pageRange.val(p);

      // habilita / deshabilita botones según página
      $prevBtn.prop("disabled", p <= 1);
      $nextBtn.prop("disabled", p >= TOTAL_PAGES);
    }

    // Botones
    $prevBtn.on("click", function(){
      if($flipbook.data("turn")) $flipbook.turn("previous");
    });
    $nextBtn.on("click", function(){
      if($flipbook.data("turn")) $flipbook.turn("next");
    });

    // Slider
    $pageRange.on("input change", function(){
      const target = parseInt(this.value, 10);
      if($flipbook.data("turn")) $flipbook.turn("page", target);
      updateUI(target);
    });

    // Teclado
    document.addEventListener("keydown", (e) => {
      if(!$flipbook.data("turn")) return;
      if(e.key === "ArrowLeft") $flipbook.turn("previous");
      if(e.key === "ArrowRight") $flipbook.turn("next");
    });

    // Swipe en móvil (touch)
    let touchStartX = null;
    let touchStartY = null;

    const stageEl = document.getElementById("stage");
    stageEl.addEventListener("touchstart", (e) => {
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, { passive: true });

    stageEl.addEventListener("touchend", (e) => {
      if(touchStartX === null) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;

      // evita que un scroll vertical pase páginas
      if(Math.abs(dy) > Math.abs(dx)) { touchStartX = null; return; }

      // umbral
      if(Math.abs(dx) > 45 && $flipbook.data("turn")){
        if(dx < 0) $flipbook.turn("next");     // swipe izquierda
        else $flipbook.turn("previous");       // swipe derecha
      }
      touchStartX = null;
    }, { passive: true });

    // Zoom
    function setZoom(newZoom){
      currentZoom = Math.max(0.7, Math.min(1.6, newZoom));
      applySize();
    }
    $zoomIn.on("click", () => setZoom(currentZoom + 0.1));
    $zoomOut.on("click", () => setZoom(currentZoom - 0.1));

    // Pantalla completa
    document.getElementById("fsBtn").addEventListener("click", async () => {
      const elem = document.documentElement;
      try{
        if(!document.fullscreenElement){
          await elem.requestFullscreen();
        }else{
          await document.exitFullscreen();
        }
        setTimeout(applySize, 250);
      }catch(e){}
    });

    // Reajustar al cambiar tamaño
    window.addEventListener("resize", () => {
      // pequeño debounce
      clearTimeout(window.__rb);
      window.__rb = setTimeout(() => applySize(), 150);
    });

    // ===== START =====
    buildPages();
    applySize();
    updateUI(1);
  </script>
</body>
</html>
