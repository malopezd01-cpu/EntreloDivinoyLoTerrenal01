<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Entre lo Divino y lo Terrenal</title>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <style>
    :root{
      --bg:#0f1115;
      --text:#e9eef7;
      --muted:#aab4c4;
      --btn:#243046;
      --btn2:#2f4060;
      --shadow:0 18px 60px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 700px at 50% -10%, #1b2340 0%, var(--bg) 55%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:14px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:5;
      background: linear-gradient(to bottom, rgba(15,17,21,.92), rgba(15,17,21,.65));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .title{
      font-weight:800;
      font-size:14px;
    }

    .controls{
      display:flex;
      gap:8px;
      align-items:center;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 12px;
      background:var(--btn);
      color:var(--text);
      font-weight:800;
      cursor:pointer;
      transition: background .2s ease, transform .05s ease;
      touch-action: manipulation;
    }

    button:hover{ background:var(--btn2); }
    button:active{ transform: translateY(1px); }

    main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .stage{
      width:min(1100px,96vw);
      height:min(720px,78vh);
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* En fullscreen ocupamos toda la pantalla */
    .stage:fullscreen{
      width:100vw;
      height:100vh;
      border-radius:0;
    }
    .stage:-webkit-full-screen{
      width:100vw;
      height:100vh;
      border-radius:0;
    }

    #book{
      width:100%;
      height:100%;
    }

    .page{
      background:#fff;
      position:relative;
      overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.10);
    }
    .page img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#fff;
    }

    /* Flechas dentro del libro */
    .navInside{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      z-index:20;
      width:44px;
      height:44px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.35);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      backdrop-filter: blur(8px);
    }
    .navInside:hover{ background: rgba(0,0,0,.50); }
    .navInside:active{ transform: translateY(-50%) scale(0.98); }

    .navLeft{ left:14px; }
    .navRight{ right:14px; }

    /* En móvil hacemos botones un poquito más grandes */
    @media (max-width:820px){
      .navInside{ width:50px; height:50px; }
    }
  </style>
</head>

<body>

<header>
  <div class="title">Entre lo Divino y lo Terrenal</div>

  <div class="controls">
    <!-- Botones header (opcionales) -->
    <button id="prev">◀</button>
    <button id="next">▶</button>

    <!-- Pantalla completa -->
    <button id="fullscreen">⛶</button>
  </div>
</header>

<main>
  <div class="stage" id="stage">
    <!-- Flechas dentro del libro -->
    <div class="navInside navLeft" id="prevInside">◀</div>
    <div class="navInside navRight" id="nextInside">▶</div>

    <div id="book"></div>
  </div>
</main>

<script>
  const TOTAL = 168;

  const book = document.getElementById("book");
  const stage = document.getElementById("stage");

  function nombrePagina(num){
    // LIBRO-01.png ... LIBRO-09.png ... LIBRO-168.png
    let n = String(num);
    if(num < 10) n = "0" + num;
    return "./LIBRO-" + n + ".png";
  }

  // Crear páginas
  for(let i=1; i<=TOTAL; i++){
    const page = document.createElement("div");
    page.className = "page";

    const img = document.createElement("img");
    img.src = nombrePagina(i);
    img.alt = "Página " + i;

    page.appendChild(img);
    book.appendChild(page);
  }

  // Inicializar flipbook
  const pageFlip = new St.PageFlip(book,{
    width:520,
    height:700,
    size:"stretch",
    minWidth:320,
    maxWidth:1400,
    minHeight:420,
    maxHeight:1000,
    showCover:true,
    mobileScrollSupport:true,
    useMouseEvents:true,
    flippingTime:700,
    swipeDistance:25
  });

  pageFlip.loadFromHTML(document.querySelectorAll(".page"));
  pageFlip.flip(0); // arrancar en portada

  // Botones header
  document.getElementById("prev").onclick = () => pageFlip.flipPrev();
  document.getElementById("next").onclick = () => pageFlip.flipNext();

  // Botones dentro del libro
  document.getElementById("prevInside").onclick = () => pageFlip.flipPrev();
  document.getElementById("nextInside").onclick = () => pageFlip.flipNext();

  // Pantalla completa (mejor usar el contenedor del libro)
  const fullBtn = document.getElementById("fullscreen");

  function requestFS(el){
    if(el.requestFullscreen) return el.requestFullscreen();
    if(el.webkitRequestFullscreen) return el.webkitRequestFullscreen(); // Safari
  }
  function exitFS(){
    if(document.exitFullscreen) return document.exitFullscreen();
    if(document.webkitExitFullscreen) return document.webkitExitFullscreen(); // Safari
  }
  function isFS(){
    return document.fullscreenElement || document.webkitFullscreenElement;
  }

  fullBtn.onclick = async () => {
    try{
      if(!isFS()) await requestFS(stage);
      else await exitFS();

      // Asegura que el flipbook se reajuste tras entrar/salir
      setTimeout(() => pageFlip.update(), 250);
    }catch(e){
      console.log(e);
      alert("Tu navegador bloqueó la pantalla completa. Intenta tocando el botón otra vez.");
    }
  };

  // Extra: doble clic / doble tap para pantalla completa (opcional, útil)
  stage.addEventListener("dblclick", () => fullBtn.click());
</script>

</body>
</html>
