<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Libro PDF - Page Flip</title>

  <style>
    :root{
      --bg:#0f1115;
      --panel:#151a22;
      --text:#e9eef7;
      --muted:#aab4c4;
      --btn:#243046;
      --btn2:#2f4060;
      --shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 50% -10%, #1b2340 0%, var(--bg) 55%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:14px 14px 10px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      background: linear-gradient(to bottom, rgba(15,17,21,.92), rgba(15,17,21,.65));
      backdrop-filter: blur(10px);
      z-index:5;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .left{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width: 180px;
    }
    .title{
      font-weight:700;
      letter-spacing:.2px;
      font-size:14px;
      line-height:1.2;
    }
    .sub{
      color:var(--muted);
      font-size:12px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    button{
      border:0;
      border-radius:12px;
      padding:10px 12px;
      background:var(--btn);
      color:var(--text);
      font-weight:600;
      cursor:pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
      transition: transform .05s ease, background .2s ease;
      touch-action: manipulation;
    }
    button:hover{ background: var(--btn2); }
    button:active{ transform: translateY(1px); }
    button:disabled{ opacity:.45; cursor:not-allowed; }

    .pagebox{
      display:flex;
      align-items:center;
      gap:8px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 8px 10px;
    }
    .pagebox input{
      width:70px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.25);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      outline:none;
      font-weight:700;
    }
    .pagebox span{ color: var(--muted); font-size:12px; }

    main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px;
    }

    .stage{
      width: min(1100px, 96vw);
      height: min(720px, 78vh);
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }

    /* Contenedor del libro */
    #book{
      width:100%;
      height:100%;
    }

    /* Loading overlay */
    .loading{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:10px;
      background: rgba(15,17,21,.75);
      backdrop-filter: blur(10px);
      z-index:10;
    }
    .spinner{
      width:28px;height:28px;
      border-radius:50%;
      border: 3px solid rgba(255,255,255,.18);
      border-top-color: rgba(255,255,255,.9);
      animation: spin .9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg);} }

    /* En móvil: 1 página (portrait) */
    @media (max-width: 820px){
      header{ gap:8px; }
      button{ padding:10px 10px; border-radius:12px; }
      .left{ min-width: 140px; }
    }
  </style>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
  <!-- StPageFlip -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
</head>

<body>
  <header>
    <div class="left">
      <div class="title">Entre lo Divino y lo Terrenal</div>
      <div class="sub" id="status">Cargando PDF…</div>
    </div>

    <div class="controls">
      <button id="btnPrev" disabled>◀ Anterior</button>
      <button id="btnNext" disabled>Siguiente ▶</button>

      <div class="pagebox">
        <span>Página</span>
        <input id="pageInput" type="number" min="1" value="1" />
        <span id="pageTotal">/ …</span>
      </div>

      <button id="btnFit">Ajustar</button>
      <button id="btnZoomIn">＋</button>
      <button id="btnZoomOut">－</button>
    </div>
  </header>

  <main>
    <div class="stage">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="font-weight:700">Generando páginas…</div>
        <div style="color:var(--muted);font-size:12px">Esto puede tardar un poco según el peso del PDF</div>
      </div>

      <div id="book"></div>
    </div>
  </main>

  <script>
    // ✅ Cambia aquí la ruta de tu PDF si lo necesitas
    const PDF_URL = "./assets/libro.pdf";

    // PDF.js worker (muy importante para Chrome/Safari)
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";

    const $ = (id) => document.getElementById(id);

    const loading = $("loading");
    const statusEl = $("status");
    const btnPrev = $("btnPrev");
    const btnNext = $("btnNext");
    const pageInput = $("pageInput");
    const pageTotal = $("pageTotal");
    const btnZoomIn = $("btnZoomIn");
    const btnZoomOut = $("btnZoomOut");
    const btnFit = $("btnFit");

    let pdfDoc = null;
    let pageFlip = null;
    let totalPages = 0;

    // Render settings
    let baseScale = 1.6;   // calidad
    let userZoom = 1.0;    // zoom manual

    // Decide 1 página en móvil y 2 en desktop
    function isMobileView() {
      return window.matchMedia("(max-width: 820px)").matches;
    }

    function calcScaleToFit() {
      // Ajuste "fit" según tamaño del contenedor
      const stage = document.querySelector(".stage");
      const w = stage.clientWidth;
      const h = stage.clientHeight;

      // Valores base razonables: en desktop se ve 2 páginas
      // ajustamos la escala para que no se corte.
      if (isMobileView()) {
        baseScale = Math.max(1.2, Math.min(2.2, w / 520));
      } else {
        baseScale = Math.max(1.2, Math.min(2.4, w / 900));
      }
    }

    async function renderPdfToImages() {
      statusEl.textContent = "Cargando PDF…";
      loading.style.display = "flex";

      const loadingTask = pdfjsLib.getDocument({
        url: PDF_URL,
        // Si algún día pones el PDF en otro dominio, necesitarás CORS.
        withCredentials: false
      });

      pdfDoc = await loadingTask.promise;
      totalPages = pdfDoc.numPages;

      pageTotal.textContent = "/ " + totalPages;
      pageInput.max = totalPages;

      statusEl.textContent = `PDF cargado (${totalPages} páginas). Renderizando…`;

      // Creamos contenedor de páginas (DIVs con IMG)
      const bookEl = $("book");
      bookEl.innerHTML = "";

      // Render secuencial (más estable y evita que “falte” alguna página)
      for (let i = 1; i <= totalPages; i++) {
        const page = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale: baseScale * userZoom });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d", { alpha: false });

        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);

        await page.render({ canvasContext: ctx, viewport }).promise;

        const img = document.createElement("img");
        img.src = canvas.toDataURL("image/jpeg", 0.92); // buena calidad y peso moderado
        img.alt = "Página " + i;
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.display = "block";
        img.style.background = "#fff"; // fondo blanco para bordes

        // Página (div) para PageFlip
        const pageDiv = document.createElement("div");
        pageDiv.style.width = "100%";
        pageDiv.style.height = "100%";
        pageDiv.style.background = "#fff";
        pageDiv.style.display = "flex";
        pageDiv.style.alignItems = "stretch";
        pageDiv.style.justifyContent = "stretch";

        // “Separación” visual tipo libro (lomo/sombra)
        pageDiv.style.boxShadow = "inset 0 0 0 1px rgba(0,0,0,.08)";

        pageDiv.appendChild(img);
        bookEl.appendChild(pageDiv);

        // Progreso simple
        statusEl.textContent = `Renderizando página ${i}/${totalPages}…`;
      }

      statusEl.textContent = "Listo. Usa swipe o botones para pasar páginas.";
      loading.style.display = "none";
    }

    function destroyFlip() {
      if (pageFlip) {
        try { pageFlip.destroy(); } catch(e) {}
        pageFlip = null;
      }
    }

    function initFlip() {
      destroyFlip();

      const bookEl = $("book");

      // Config del libro
      pageFlip = new St.PageFlip(bookEl, {
        width: isMobileView() ? 420 : 520,
        height: isMobileView() ? 600 : 700,
        size: "stretch",                 // se adapta al contenedor
        minWidth: 320,
        maxWidth: 1400,
        minHeight: 420,
        maxHeight: 1000,
        maxShadowOpacity: 0.35,
        showCover: false,
        mobileScrollSupport: true,       // ✅ importante para celular
        useMouseEvents: true,            // ✅ mouse + touch
        flippingTime: 650,
        swipeDistance: 25
      });

      pageFlip.loadFromHTML(bookEl.querySelectorAll("div"));

      // Eventos
      pageFlip.on("flip", (e) => {
        const pageIndex = e.data; // 0-based
        const current = pageIndex + 1;
        pageInput.value = current;
        updateButtons();
      });

      updateButtons();
      btnPrev.disabled = false;
      btnNext.disabled = false;
    }

    function updateButtons() {
      if (!pageFlip) return;
      const current = pageFlip.getCurrentPageIndex() + 1;
      btnPrev.disabled = current <= 1;
      btnNext.disabled = current >= totalPages;
    }

    async function rebuildBook() {
      // Recalcula escala y reconstruye (cuando cambia zoom o resize)
      loading.style.display = "flex";
      statusEl.textContent = "Recalculando vista…";

      destroyFlip();
      calcScaleToFit();
      await renderPdfToImages();
      initFlip();
    }

    // Controles
    btnPrev.addEventListener("click", () => pageFlip && pageFlip.flipPrev());
    btnNext.addEventListener("click", () => pageFlip && pageFlip.flipNext());

    pageInput.addEventListener("change", () => {
      if (!pageFlip) return;
      let v = parseInt(pageInput.value || "1", 10);
      if (isNaN(v)) v = 1;
      v = Math.max(1, Math.min(totalPages, v));
      pageInput.value = v;
      pageFlip.flip(v - 1);
      updateButtons();
    });

    btnZoomIn.addEventListener("click", async () => {
      userZoom = Math.min(2.0, +(userZoom + 0.15).toFixed(2));
      await rebuildBook();
    });

    btnZoomOut.addEventListener("click", async () => {
      userZoom = Math.max(0.7, +(userZoom - 0.15).toFixed(2));
      await rebuildBook();
    });

    btnFit.addEventListener("click", async () => {
      userZoom = 1.0;
      await rebuildBook();
    });

    // Resize: cambia entre 1 página (móvil) y 2 páginas (desktop)
    let resizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => rebuildBook(), 250);
    });

    // Arranque
    (async function start(){
      try{
        calcScaleToFit();
        await renderPdfToImages();
        initFlip();
      }catch(err){
        console.error(err);
        loading.style.display = "none";
        statusEl.textContent = "Error cargando el PDF. Revisa que ./assets/libro.pdf exista.";
        alert("Error: no se pudo cargar el PDF. Verifica la ruta y que el archivo exista en /assets.");
      }
    })();
  </script>
</body>
</html>
