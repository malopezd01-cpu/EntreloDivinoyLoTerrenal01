<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>

<title>Entre lo Divino y lo Terrenal</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

<style>

:root{
--bg:#0f1115;
--text:#e9eef7;
--muted:#aab4c4;
--btn:#243046;
--btn2:#2f4060;
--shadow:0 18px 60px rgba(0,0,0,.45);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
background: radial-gradient(1200px 700px at 50% -10%, #1b2340 0%, var(--bg) 55%);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:14px;
display:flex;
gap:10px;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:5;
background: linear-gradient(to bottom, rgba(15,17,21,.92), rgba(15,17,21,.65));
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,.06);
}

.title{
font-weight:800;
font-size:14px;
}

.controls{
display:flex;
gap:8px;
align-items:center;
}

button{
border:0;
border-radius:12px;
padding:10px 12px;
background:var(--btn);
color:var(--text);
font-weight:800;
cursor:pointer;
}

button:hover{
background:var(--btn2)
}

main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:14px
}

.stage{
width:min(1100px,96vw);
height:min(720px,78vh);
background: rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
box-shadow:var(--shadow);
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

#book{
width:100%;
height:100%;
}

.page{
background:#fff;
position:relative;
overflow:hidden;
box-shadow: inset 0 0 0 1px rgba(0,0,0,.10);
}

.page img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}

</style>

</head>

<body>

<header>

<div class="title">
Entre lo Divino y lo Terrenal
</div>

<div class="controls">

<button id="prev">◀</button>
<button id="next">▶</button>

</div>

</header>

<main>

<div class="stage">

<div id="book"></div>

</div>

</main>

<script>

const TOTAL = 168

const book = document.getElementById("book")

function nombrePagina(num){

let n = num.toString()

if(num < 10){
n = "0"+num
}

return "./LIBRO-"+n+".png"

}

for(let i=1;i<=TOTAL;i++){

let page = document.createElement("div")
page.className="page"

let img = document.createElement("img")

img.src = nombrePagina(i)

page.appendChild(img)

book.appendChild(page)

}

const pageFlip = new St.PageFlip(book,{

width:520,
height:700,
size:"stretch",

minWidth:320,
maxWidth:1400,

minHeight:420,
maxHeight:1000,

showCover:true,

mobileScrollSupport:true,

useMouseEvents:true,

flippingTime:700

})

pageFlip.loadFromHTML(document.querySelectorAll(".page"))

pageFlip.flip(0)

document.getElementById("prev").onclick=()=>{

pageFlip.flipPrev()

}

document.getElementById("next").onclick=()=>{

pageFlip.flipNext()

}

</script>

</body>

</html>
