<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entre lo Divino y lo Terrenal</title>

  <!-- CARGA ROBUSTA: CDNJS + fallback a jsDelivr -->
  <script>
    function loadScript(src){
      return new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src=src; s.async=true;
        s.onload=()=>resolve(src);
        s.onerror=()=>reject(src);
        document.head.appendChild(s);
      });
    }

    async function loadDeps(){
      // jQuery
      try { await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"); }
      catch(e1){ await loadScript("https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"); }

      // Turn.js
      try { await loadScript("https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"); }
      catch(e2){ await loadScript("https://cdn.jsdelivr.net/npm/turn.js@4/turn.min.js"); }
    }
  </script>

  <style>
    :root{
      --bg:#0f0f10;
      --panel: rgba(255,255,255,.05);
      --border: rgba(255,255,255,.12);
      --text:#f2f2f3;
      --muted:#b9bcc2;
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 50% 30%, #1a1a1d 0%, var(--bg) 60%);
      color:var(--text);
      min-height:100vh;
    }

    /* BARRA: z-index máximo para que NO la tape el flipbook */
    .topbar{
      position: sticky;
      top: 0;
      z-index: 2147483647;
      background: rgba(15,15,16,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.10);
      padding: 10px 12px;
      pointer-events: auto;
    }
    .topbar *{ pointer-events:auto; }

    .topbar-inner{
      max-width: 1200px;
      margin: 0 auto;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .title strong{font-size:15px}
    .title span{font-size:12px; color:var(--muted)}

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color:var(--text);
      padding:8px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-weight:700;
      font-size:13px;
      user-select:none;
    }
    .btn:active{transform: translateY(1px);}
    .btn[disabled]{opacity:.4; cursor:not-allowed; transform:none;}

    .group{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border:1px solid rgba(255,255,255,.10);
      border-radius:999px;
      background: rgba(255,255,255,.04);
    }
    .label{color:var(--muted); font-size:12px; white-space:nowrap;}
    input[type="range"]{width: 170px;}
    .pagebox{min-width: 100px; text-align:center; font-size:12px; color:var(--muted);}

    .wrap{
      max-width: 1200px;
      width: 100%;
      margin: 18px auto 30px;
      padding: 0 12px;
      display:flex;
      justify-content:center;
    }
    .stage{
      width: min(1100px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      position: relative;
      z-index: 1;
    }

    /* separación central (lomo) visible en PC */
    .stage::after{
      content:"";
      position:absolute;
      top: 12px;
      bottom: 12px;
      left: 50%;
      width: 2px;
      transform: translateX(-1px);
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,.30), transparent);
      opacity: .65;
      pointer-events:none;
    }

    #flipbook{ margin: 0 auto; }

    .page{
      background:#fff;
      overflow:hidden;
      position: relative;
    }
    .page::before{
      content:"";
      position:absolute;
      inset:0;
      border: 1px solid rgba(0,0,0,.10);
      pointer-events:none;
    }

    /* sombra interna cerca del lomo */
    .page.left::after, .page.right::after{
      content:"";
      position:absolute;
      top:0; bottom:0;
      width: 24px;
      pointer-events:none;
      opacity:.55;
    }
    .page.left::after{
      right:0;
      background: linear-gradient(to right, transparent, rgba(0,0,0,.22));
    }
    .page.right::after{
      left:0;
      background: linear-gradient(to left, transparent, rgba(0,0,0,.22));
    }

    .page img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#000;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    .missing{
      width:100%;
      height:100%;
      background: repeating-linear-gradient(
        45deg,#fff,#fff 12px,#f1f1f1 12px,#f1f1f1 24px
      );
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
      color:#111;
      text-align:center;
      font-weight:900;
      font-size: 14px;
      line-height:1.35;
    }
    .missing small{
      display:block;
      margin-top:8px;
      font-weight:700;
      opacity:.75;
    }

    .banner{
      max-width:1200px;
      margin:12px auto 0;
      padding:0 12px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
    .fatal{
      max-width:900px;
      margin: 22px auto;
      padding: 16px 14px;
      border: 1px solid rgba(255,100,100,.35);
      background: rgba(255,80,80,.12);
      border-radius: 12px;
      color: #ffd7d7;
      font-weight:800;
      text-align:center;
    }

    @media (max-width: 760px){
      input[type="range"]{width: 120px;}
      .stage{padding:10px;}
      .stage::after{display:none;}
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="title">
        <strong>Entre lo Divino y lo Terrenal</strong>
        <span>Flipbook · GitHub Pages</span>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn" type="button">← Anterior</button>
        <button class="btn" id="nextBtn" type="button">Siguiente →</button>

        <div class="group">
          <span class="label">Página</span>
          <input id="pageRange" type="range" min="1" max="168" value="1" />
          <div class="pagebox"><span id="pageNow">1</span> / <span id="pageTotal">168</span></div>
        </div>

        <button class="btn" id="zoomOut" type="button">− Zoom</button>
        <button class="btn" id="zoomIn" type="button">+ Zoom</button>
      </div>
    </div>
  </div>

  <div class="banner">En celular: swipe izquierda/derecha. En PC: botones o flechas ← →. También puedes hacer click en la página (izq/der).</div>

  <div class="wrap">
    <div class="stage" id="stage">
      <div id="flipbook"></div>
      <div id="fatal" style="display:none;" class="fatal"></div>
    </div>
  </div>

  <script>
    const TOTAL_PAGES = 168;
    const PREFIX = "LIBRO-";
    const EXT = ".png";

    function pageName(i){
      const n = (i < 10) ? ("0" + i) : String(i);
      return `${PREFIX}${n}${EXT}`;
    }

    function getBookSize(){
      const stage = document.getElementById("stage");
      const w = stage.clientWidth - 24;
      const hMax = Math.round(window.innerHeight * 0.78);
      const isMobile = window.matchMedia("(max-width: 760px)").matches;
      const display = isMobile ? "single" : "double";

      const ratio = 1.414; // aprox A4
      let bookW = Math.min(w, 1100);
      let pageW = isMobile ? bookW : Math.floor(bookW / 2);
      let pageH = Math.floor(pageW * ratio);

      if(pageH > hMax){
        pageH = hMax;
        pageW = Math.floor(pageH / ratio);
        bookW = isMobile ? pageW : pageW * 2;
      }
      return { bookW, bookH: pageH, display };
    }

    function setLeftRightClasses(){
      const $pages = document.querySelectorAll("#flipbook .page");
      $pages.forEach(p => p.classList.remove("left","right"));

      const isMobile = window.matchMedia("(max-width: 760px)").matches;
      if(isMobile){
        $pages.forEach(p => p.classList.add("right"));
        return;
      }

      $pages.forEach((p, idx)=>{
        const pageNumber = idx + 1;
        if(pageNumber % 2 === 0) p.classList.add("left");
        else p.classList.add("right");
      });
    }

    async function main(){
      await loadDeps();

      const fatal = document.getElementById("fatal");
      if(!window.jQuery){
        fatal.style.display="block";
        fatal.textContent="❌ No cargó jQuery. Revisa AdBlock/Privacidad de Safari o tu conexión.";
        return;
      }
      if(!jQuery.fn.turn){
        fatal.style.display="block";
        fatal.textContent="❌ No cargó Turn.js (la librería del efecto libro). Safari/AdBlock puede estar bloqueando el CDN. Desactiva el bloqueador y recarga.";
        return;
      }

      const $flipbook = jQuery("#flipbook");
      const $pageRange = jQuery("#pageRange");
      const $pageNow = jQuery("#pageNow");
      const $pageTotal = jQuery("#pageTotal");
      const $prevBtn = jQuery("#prevBtn");
      const $nextBtn = jQuery("#nextBtn");
      const $zoomIn = jQuery("#zoomIn");
      const $zoomOut = jQuery("#zoomOut");

      $pageTotal.text(TOTAL_PAGES);
      $pageRange.attr("max", TOTAL_PAGES);

      // construir páginas
      $flipbook.empty();
      for(let i=1;i<=TOTAL_PAGES;i++){
        const file = pageName(i);
        const $img = jQuery(`<img alt="Página ${i}" src="${file}">`);
        const $page = jQuery(`<div class="page"></div>`).append($img);

        $img.on("error", function(){
          $page.empty().append(`
            <div class="missing">
              FALTA ESTA PÁGINA
              <small>${file}</small>
              <small>Revisa el nombre EXACTO en GitHub</small>
            </div>
          `);
        });

        $flipbook.append($page);
      }

      let zoom = 1;

      function updateUI(page){
        const p = page || ($flipbook.data("turn") ? $flipbook.turn("page") : 1);
        $pageNow.text(p);
        $pageRange.val(p);
        $prevBtn.prop("disabled", p <= 1);
        $nextBtn.prop("disabled", p >= TOTAL_PAGES);
      }

      function initOrResize(){
        const { bookW, bookH, display } = getBookSize();
        const W = Math.floor(bookW * zoom);
        const H = Math.floor(bookH * zoom);

        if($flipbook.data("turn")){
          $flipbook.turn("display", display);
          $flipbook.turn("size", W, H);
          setLeftRightClasses();
          updateUI();
          return;
        }

        $flipbook.turn({
          width: W,
          height: H,
          autoCenter: true,
          display,
          elevation: 90,
          gradients: true,
          duration: 950,
          acceleration: true,
          when:{
            turning: function(e, page){ updateUI(page); },
            turned: function(e, page){ setLeftRightClasses(); updateUI(page); }
          }
        });

        setLeftRightClasses();
        updateUI(1);
      }

      // BOTONES (garantizado)
      $prevBtn.on("click", () => $flipbook.turn("previous"));
      $nextBtn.on("click", () => $flipbook.turn("next"));

      // SLIDER
      $pageRange.on("input change", function(){
        const p = parseInt(this.value,10);
        $flipbook.turn("page", p);
        updateUI(p);
      });

      // TECLAS
      document.addEventListener("keydown", (e)=>{
        if(e.key === "ArrowLeft") $flipbook.turn("previous");
        if(e.key === "ArrowRight") $flipbook.turn("next");
      });

      // CLICK EN LA PÁGINA (derecha=next / izquierda=prev)
      document.getElementById("stage").addEventListener("click", (e)=>{
        // evita que clicks en la barra afecten
        const topbar = document.querySelector(".topbar");
        const r = topbar.getBoundingClientRect();
        if(e.clientY >= r.top && e.clientY <= r.bottom) return;

        const stageRect = document.getElementById("stage").getBoundingClientRect();
        const mid = stageRect.left + stageRect.width/2;
        if(e.clientX > mid) $flipbook.turn("next");
        else $flipbook.turn("previous");
      });

      // SWIPE MOVIL
      let sx=null, sy=null;
      const stageEl = document.getElementById("stage");
      stageEl.addEventListener("touchstart", (e)=>{
        const t=e.touches[0];
        sx=t.clientX; sy=t.clientY;
      }, {passive:true});
      stageEl.addEventListener("touchend", (e)=>{
        if(sx===null) return;
        const t=e.changedTouches[0];
        const dx=t.clientX - sx;
        const dy=t.clientY - sy;
        if(Math.abs(dy) > Math.abs(dx)) { sx=null; return; }
        if(Math.abs(dx) > 40){
          if(dx < 0) $flipbook.turn("next");
          else $flipbook.turn("previous");
        }
        sx=null;
      }, {passive:true});

      // ZOOM
      function applyZoom(z){
        zoom = Math.max(0.7, Math.min(1.6, z));
        initOrResize();
      }
      $zoomIn.on("click", ()=>applyZoom(zoom+0.1));
      $zoomOut.on("click", ()=>applyZoom(zoom-0.1));

      // INIT
      initOrResize();
      window.addEventListener("resize", ()=>{
        clearTimeout(window.__rz);
        window.__rz=setTimeout(initOrResize, 180);
      });
    }

    // arrancar
    main();
  </script>
</body>
</html>
