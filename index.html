<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Entre lo Divino y lo Terrenal</title>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <style>
    :root{ --bg:#0f1115; --text:#e9eef7; --muted:#aab4c4; --btn:#243046; --btn2:#2f4060; --shadow:0 18px 60px rgba(0,0,0,.45); }
    *{box-sizing:border-box}
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 700px at 50% -10%, #1b2340 0%, var(--bg) 55%);
      color:var(--text); min-height:100vh; display:flex; flex-direction:column;
    }
    header{
      padding:14px; display:flex; gap:10px; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:5;
      background: linear-gradient(to bottom, rgba(15,17,21,.92), rgba(15,17,21,.65));
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .left{display:flex;flex-direction:column;gap:2px;min-width:160px}
    .title{font-weight:800;font-size:14px}
    .sub{color:var(--muted);font-size:12px}
    .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    button{
      border:0;border-radius:12px;padding:10px 12px;background:var(--btn);
      color:var(--text);font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.25);
      transition:transform .05s ease, background .2s ease; touch-action:manipulation;
    }
    button:hover{background:var(--btn2)} button:active{transform:translateY(1px)}
    button:disabled{opacity:.45;cursor:not-allowed}
    .pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08);}
    .pill label{color:var(--muted);font-size:12px}
    .pill input{
      border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.25);
      color:var(--text); border-radius:10px; padding:8px 10px; outline:none; font-weight:900;
    }
    #pageInput{width:76px} #dateInput{width:160px}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:14px}
    .stage{
      width:min(1100px,96vw); height:min(720px,78vh);
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px; box-shadow:var(--shadow);
      position:relative; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    #book{width:100%;height:100%}

    .page{ background:#fff; position:relative; overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.10); }
    .page img{ width:100%; height:100%; object-fit:contain; display:block; background:#fff; }
    .stamp{
      position:absolute; top:14px; right:14px;
      font:800 14px system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:rgba(20,20,20,.85);
      background:rgba(255,255,255,.60);
      border:1px solid rgba(0,0,0,.08);
      border-radius:12px;
      padding:8px 10px;
      backdrop-filter: blur(6px);
      pointer-events:none;
    }
    .skeleton{
      position:absolute; inset:0;
      background: linear-gradient(90deg, #f2f2f2 0%, #e9e9e9 40%, #f2f2f2 80%);
      background-size:200% 100%;
      animation: sh 1.1s linear infinite;
    }
    @keyframes sh{ to{ background-position:-200% 0; } }
    @media (max-width: 820px){ #dateInput{width:145px} }
  </style>
</head>

<body>
  <header>
    <div class="left">
      <div class="title">Entre lo Divino y lo Terrenal</div>
      <div class="sub" id="status">Cargando…</div>
    </div>

    <div class="controls">
      <button id="btnPrev">◀</button>
      <button id="btnNext">▶</button>

      <div class="pill">
        <label>Página</label>
        <input id="pageInput" type="number" min="1" value="1"/>
        <label id="pageTotal">/ 168</label>
      </div>

      <div class="pill">
        <label>Fecha</label>
        <input id="dateInput" type="date"/>
      </div>

      <button id="btnApplyDate">Aplicar fecha</button>
    </div>
  </header>

  <main>
    <div class="stage">
      <div id="book"></div>
    </div>
  </main>

  <script>
    // ====== TU CASO (repo en raíz con LIBRO-#.png) ======
    const TOTAL = 168;
    const IMG_PREFIX = "./LIBRO-";
    const IMG_EXT = ".png";

    // Carga rápida: solo carga alrededor de la página actual
    const WINDOW = 8;
    const imgCache = new Map();

    const $ = (id)=>document.getElementById(id);
    const statusEl = $("status");
    const btnPrev = $("btnPrev");
    const btnNext = $("btnNext");
    const pageInput = $("pageInput");
    const pageTotal = $("pageTotal");
    const dateInput = $("dateInput");
    const btnApplyDate = $("btnApplyDate");
    const bookEl = $("book");

    pageTotal.textContent = "/ " + TOTAL;
    pageInput.max = TOTAL;

    function imgUrl(page){ return IMG_PREFIX + page + IMG_EXT; } // ./LIBRO-1.png

    function formatDate(iso){
      if(!iso) return "";
      const [y,m,d]=iso.split("-");
      return `${d}/${m}/${y}`;
    }

    function makeStampText(page){
      const d = formatDate(dateInput.value);
      const p = `Pág. ${String(page).padStart(2,"0")}/${TOTAL}`;
      return d ? `${d} • ${p}` : p;
    }

    function createPageDiv(pageNumber){
      const div = document.createElement("div");
      div.className = "page";
      div.dataset.page = String(pageNumber);

      const img = document.createElement("img");
      img.alt = "Página " + pageNumber;

      const skeleton = document.createElement("div");
      skeleton.className = "skeleton";

      const stamp = document.createElement("div");
      stamp.className = "stamp";
      stamp.textContent = makeStampText(pageNumber);

      div.appendChild(img);
      div.appendChild(skeleton);
      div.appendChild(stamp);
      return div;
    }

    function updateAllStamps(){
      document.querySelectorAll(".page .stamp").forEach(st=>{
        const page = parseInt(st.parentElement.dataset.page,10);
        st.textContent = makeStampText(page);
      });
    }

    function ensureImageLoaded(page){
      if(page < 1 || page > TOTAL) return;
      if(imgCache.get(page)) return;

      const pageDiv = document.querySelector(`.page[data-page="${page}"]`);
      if(!pageDiv) return;

      const img = pageDiv.querySelector("img");
      const skeleton = pageDiv.querySelector(".skeleton");

      imgCache.set(page, true);

      const url = imgUrl(page);
      const pre = new Image();
      pre.onload = () => {
        img.src = url;
        if(skeleton) skeleton.remove();
      };
      pre.onerror = () => {
        imgCache.delete(page);
        statusEl.textContent = `⚠️ No cargó: ${url} (revisa nombre/ubicación)`;
      };
      pre.src = url;
    }

    function prefetchWindow(currentPage){
      const start = Math.max(1, currentPage - WINDOW);
      const end = Math.min(TOTAL, currentPage + WINDOW);
      for(let p=start; p<=end; p++) ensureImageLoaded(p);
    }

    // Construye las 168 páginas como contenedores livianos (sin cargar todo)
    bookEl.innerHTML = "";
    for(let i=1;i<=TOTAL;i++) bookEl.appendChild(createPageDiv(i));

    const isMobile = () => window.matchMedia("(max-width: 820px)").matches;

    const pageFlip = new St.PageFlip(bookEl, {
      width: isMobile() ? 420 : 520,
      height: isMobile() ? 600 : 700,
      size:"stretch",
      minWidth:320, maxWidth:1400,
      minHeight:420, maxHeight:1000,
      showCover:false,
      maxShadowOpacity:0.35,
      mobileScrollSupport:true,
      useMouseEvents:true,
      flippingTime:650,
      swipeDistance:25
    });

    pageFlip.loadFromHTML(bookEl.querySelectorAll(".page"));

    function updateButtons(){
      const current = pageFlip.getCurrentPageIndex() + 1;
      btnPrev.disabled = current <= 1;
      btnNext.disabled = current >= TOTAL;
    }

    pageFlip.on("flip", (e)=>{
      const current = e.data + 1;
      pageInput.value = String(current);
      updateButtons();
      prefetchWindow(current);
    });

    btnPrev.addEventListener("click", ()=>pageFlip.flipPrev());
    btnNext.addEventListener("click", ()=>pageFlip.flipNext());

    pageInput.addEventListener("change", ()=>{
      let v = parseInt(pageInput.value||"1",10);
      if(isNaN(v)) v = 1;
      v = Math.max(1, Math.min(TOTAL, v));
      pageInput.value = String(v);
      pageFlip.flip(v-1);
      prefetchWindow(v);
      updateButtons();
    });

    btnApplyDate.addEventListener("click", ()=>{
      updateAllStamps();
      statusEl.textContent = "Fecha actualizada";
      const current = pageFlip.getCurrentPageIndex() + 1;
      prefetchWindow(current);
    });

    // Fecha default: hoy
    (function setToday(){
      const t = new Date();
      const yyyy=t.getFullYear();
      const mm=String(t.getMonth()+1).padStart(2,"0");
      const dd=String(t.getDate()).padStart(2,"0");
      dateInput.value = `${yyyy}-${mm}-${dd}`;
      updateAllStamps();
    })();

    // Primera carga: páginas cercanas a 1
    statusEl.textContent = "Listo (carga rápida)";
    prefetchWindow(1);
    updateButtons();

    // Resize
    let rT=null;
    window.addEventListener("resize", ()=>{
      clearTimeout(rT);
      rT=setTimeout(()=>{
        const current = pageFlip.getCurrentPageIndex();
        pageFlip.update();
        pageFlip.flip(current);
        prefetchWindow(current+1);
      }, 250);
    });
  </script>
</body>
</html>
